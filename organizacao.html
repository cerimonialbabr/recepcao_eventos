<body>
<header class="topo">
  <div class="identidade-evento">
    <p class="nome-sistema">Sistema de Gestão de Recepção em Eventos Sociais</p>
    <h1 data-evento-nome>Evento</h1>
    <p class="dados-evento" data-evento-dados></p>
  </div>
  <nav class="navegacao">
  <a  href="index.html">Recepção</a>
  <a  href="nominata.html">Nominata</a>

  <a class="ativo" href="organizacao.html">Organização</a>

<main class="container">
<section class="painel">
<div class="barra-organizacao">
<div><label class="rotulo" for="filtroOrganizacao">Pesquisar</label>

<div><label class="rotulo" for="filtroNominata">Nominata</label>
<select id="filtroNominata" class="campo-select"><option value="">Todos</option><option value="sim">Inseridos</option><option value="nao">Não inseridos</option></select></div>
</div>
<p id="mensagemOrganizacao" class="mensagem-neutra">Carregando...</p>
<div id="listaOrganizacao" class="lista-organizacao"></div>
</section></main>
<div id="modalEdicao" class="modal oculto" aria-hidden="true"><div class="modal-fundo" data-fechar-modal></div>
<section class="modal-conteudo modal-largo" role="dialog" aria-modal="true">
<button class="botao-fechar" type="button" data-fechar-modal>×</button><div id="conteudoEdicao"></div>
</section></div>
<div id="toast" class="toast oculto"></div>
