<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoridades | Recepção BABR</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <div>
      <p class="topo-marca">BASE AÉREA DE BRASÍLIA</p>
      <h1>Autoridades</h1>
      <p class="topo-subtitulo">Identificação visual e confirmação de presença</p>
    </div>
    <nav class="navegacao">
      <a href="index.html">Recepção</a>
      <a class="ativo" href="autoridades.html">Autoridades</a>
      <a href="mesas.html">Mesas</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="container">
    <section class="painel">
      <div class="cabecalho-secao">
        <div>
          <h2>Aguardando confirmação</h2>
          <p>Somente pessoas marcadas para confirmação.</p>
        </div>
        <button id="atualizarAutoridades" class="botao-secundario" type="button">
          Atualizar
        </button>
      </div>
      <div id="listaAutoridades" class="grade-autoridades"></div>
      <p id="mensagemAutoridades" class="mensagem-neutra">Carregando...</p>
    </section>

    <section class="painel">
      <details>
        <summary>Presenças já confirmadas</summary>
        <div id="autoridadesConfirmadas" class="grade-autoridades compacto"></div>
      </details>
    </section>
  </main>

  <div id="toast" class="toast oculto"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/util.js"></script>
  <script src="js/autoridades.js"></script>
</body>
</html>
