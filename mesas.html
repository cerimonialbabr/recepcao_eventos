<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesas | Recepção BABR</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <div>
      <p class="topo-marca">BASE AÉREA DE BRASÍLIA</p>
      <h1>Mesas</h1>
      <p class="topo-subtitulo">Ocupação e movimentação de convidados</p>
    </div>
    <nav class="navegacao">
      <a href="index.html">Recepção</a>
      <a href="autoridades.html">Autoridades</a>
      <a class="ativo" href="mesas.html">Mesas</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="container">
    <section class="painel">
      <div class="cabecalho-secao">
        <div>
          <h2>Mapa das mesas</h2>
          <p>Clique em uma mesa para visualizar os convidados.</p>
        </div>
        <button id="atualizarMesas" class="botao-secundario" type="button">Atualizar</button>
      </div>
      <div id="mapaMesas" class="mapa-mesas"></div>
      <p id="mensagemMesas" class="mensagem-neutra">Carregando...</p>
    </section>
  </main>

  <div id="modalMesa" class="modal oculto" aria-hidden="true">
    <div class="modal-fundo" data-fechar-modal></div>
    <section class="modal-conteudo" role="dialog" aria-modal="true">
      <button class="botao-fechar" type="button" data-fechar-modal aria-label="Fechar">×</button>
      <div id="conteudoMesa"></div>
    </section>
  </div>

  <div id="toast" class="toast oculto"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/util.js"></script>
  <script src="js/mesas.js"></script>
</body>
</html>
